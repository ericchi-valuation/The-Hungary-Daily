name: The Hungarian Daily — Auto Podcast Generator

on:
  schedule:
    # 04:00 UTC = 06:00 Budapest Summer Time (CEST = UTC+2)
    # 前置 30 分鐘起跟，补償 GitHub Actions 排隊延遲 (15–30 min)、API 超時重試 (503 retry)
    # ✔ 夏令時 (CEST = UTC+2): 04:00 UTC = 06:00 Budapest → 預期範封 07:00
    # ⚠️ 冬令時 (CET  = UTC+1): 請改為 '00 05 * * *' (十月下旬從)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  build_podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for GitHub Releases and git push

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: ⚙️ Setup ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: ⚙️ Verify ffmpeg
        run: ffmpeg -version

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 feedparser python-dotenv google-genai edge-tts pydub audioop-lts podgen

      - name: 🎙️ Run main pipeline (scrape → AI script → AI editor → TTS → mix → email → Threads)
        timeout-minutes: 30
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:   ${{ secrets.ELEVENLABS_API_KEY }}
          GMAIL_ADDRESS:         ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          THREADS_USER_ID:       ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          FB_GROUP_ID:           ${{ secrets.FB_GROUP_ID }}
          FB_ACCESS_TOKEN:       ${{ secrets.FB_ACCESS_TOKEN }}
        run: python main.py

      # ==========================================
      # 🌟 新增：將產出的匈牙利稿件與音檔打包存檔 (Artifacts)
      # ==========================================
      - name: 📤 Upload Draft Script and Audio (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: HungaryDaily-Podcast-Outputs
          path: |
            script.txt
            summary.txt
            HungaryDaily_Podcast.mp3
            HungaryDaily_Podcast_Final.mp3
          retention-days: 7 # 檔案保留 7 天

      - name: 🚀 Upload MP3 to GitHub Releases and update RSS (feed.xml)
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get today's date in Budapest time
          TODAY=$(TZ='Europe/Budapest' date +'%Y-%m-%d')
          ISO_DATE=$(TZ='Europe/Budapest' date +'%Y-%m-%dT%H:%M:%S%:z')

          echo "==== Measuring audio file ===="
          DURATION=$(ffprobe -i HungaryDaily_Podcast_Final.mp3 -show_entries format=duration -v quiet -of csv="p=0" | cut -d'.' -f1)
          if [ -z "$DURATION" ]; then DURATION=600; fi
          FORMATTED_DURATION=$(printf "%02d:%02d:%02d\n" $(($DURATION/3600)) $(($DURATION%3600/60)) $(($DURATION%60)))

          FILE_SIZE=$(stat -c%s "HungaryDaily_Podcast_Final.mp3")

          echo "==== Creating GitHub Release ===="
          gh release create "ep-${TODAY}" HungaryDaily_Podcast_Final.mp3 \
            --title "The Hungarian Daily — ${TODAY}" \
            --notes "Auto-generated daily English podcast about Hungary." || true

          echo "==== Updating RSS Feed ===="
          URL="https://github.com/${{ github.repository }}/releases/download/ep-${TODAY}/HungaryDaily_Podcast_Final.mp3"

          # Read the AI-generated concise summary
          SUMMARY=$(cat summary.txt | tr -d '"' | tr -d "'")
          if [ -z "$SUMMARY" ]; then SUMMARY="Today's top news and updates from Hungary for expats and international professionals."; fi

          python core/rss_generator.py \
            --title "The Hungarian Daily — ${TODAY}" \
            --summary "$SUMMARY" \
            --date "$ISO_DATE" \
            --url "$URL" \
            --duration "$FORMATTED_DURATION" \
            --size "$FILE_SIZE"

      - name: 💾 Commit updated RSS feed to repository
        run: |
          TODAY=$(TZ='Europe/Budapest' date +'%Y-%m-%d')
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed.xml episodes.json
          git commit -m "Auto-update podcast feed for ${TODAY}" || exit 0
          git pull --rebase origin main --autostash
          git push