name: The Hungarian Daily — Auto Podcast Generator

on:
  schedule:
    # 00:00 UTC = 02:00 Budapest Summer Time (CEST = UTC+2)
    # Pipeline takes ~5-10 min (Kokoro TTS). Expected completion: 02:10-02:30 Budapest.
    # ✔ 夏令時 (CEST = UTC+2): 00:00 UTC = 02:00 Budapest
    # ⚠️ 冬令時 (CET  = UTC+1): 請改為 '0 1 * * *' (十月最後一個週日起)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  build_podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for GitHub Releases and git push

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ⚙️ Install system dependencies (ffmpeg + espeak-ng)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng
          ffmpeg -version

      - name: 🤗 Cache Kokoro TTS model (avoid HuggingFace 429 rate limits)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: kokoro-82m-${{ runner.os }}-v1
          restore-keys: |
            kokoro-82m-${{ runner.os }}-

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 feedparser python-dotenv google-genai edge-tts pydub podgen soundfile numpy "kokoro>=0.9.4"

      - name: 🎙️ Run main pipeline (scrape → AI script → AI editor → TTS → mix → email → Threads)
        timeout-minutes: 30
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:   ${{ secrets.ELEVENLABS_API_KEY }}
          GMAIL_ADDRESS:         ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          THREADS_USER_ID:       ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          FB_GROUP_ID:           ${{ secrets.FB_GROUP_ID }}
          FB_ACCESS_TOKEN:       ${{ secrets.FB_ACCESS_TOKEN }}
          # Optional: HuggingFace token to avoid model download rate limits.
          # Create a free read token at https://huggingface.co/settings/tokens
          # and add it as HF_TOKEN in GitHub Secrets.
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python main.py

      # ==========================================
      # 🌟 新增：將產出的匈牙利稿件與音檔打包存檔 (Artifacts)
      # ==========================================
      - name: 📤 Upload Draft Script and Audio (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: HungaryDaily-Podcast-Outputs
          path: |
            script.txt
            summary.txt
            HungaryDaily_Podcast.mp3
            HungaryDaily_Podcast_Final.mp3
          retention-days: 7 # 檔案保留 7 天

      - name: 🚀 Upload MP3 to GitHub Releases and update RSS (feed.xml)
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get today's date in Budapest time
          TODAY=$(TZ='Europe/Budapest' date +'%Y-%m-%d')
          ISO_DATE=$(TZ='Europe/Budapest' date +'%Y-%m-%dT%H:%M:%S%:z')

          echo "==== Measuring audio file ===="
          DURATION=$(ffprobe -i HungaryDaily_Podcast_Final.mp3 -show_entries format=duration -v quiet -of csv="p=0" | cut -d'.' -f1)
          if [ -z "$DURATION" ]; then DURATION=600; fi
          FORMATTED_DURATION=$(printf "%02d:%02d:%02d\n" $(($DURATION/3600)) $(($DURATION%3600/60)) $(($DURATION%60)))

          FILE_SIZE=$(stat -c%s "HungaryDaily_Podcast_Final.mp3")

          echo "==== Creating GitHub Release ===="
          gh release create "ep-${TODAY}" HungaryDaily_Podcast_Final.mp3 \
            --title "The Hungarian Daily — ${TODAY}" \
            --notes "Auto-generated daily English podcast about Hungary." || true

          echo "==== Updating RSS Feed ===="
          URL="https://github.com/${{ github.repository }}/releases/download/ep-${TODAY}/HungaryDaily_Podcast_Final.mp3"

          # summary.txt is written by script_generator.py during the pipeline run.
          # We pass it as a file path to avoid shell quoting / length issues with long descriptions.
          python core/rss_generator.py \
            --title "The Hungarian Daily — ${TODAY}" \
            --summary-file summary.txt \
            --date "$ISO_DATE" \
            --url "$URL" \
            --duration "$FORMATTED_DURATION" \
            --size "$FILE_SIZE"

      - name: 💾 Commit updated RSS feed to repository
        run: |
          TODAY=$(TZ='Europe/Budapest' date +'%Y-%m-%d')
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed.xml episodes.json
          git commit -m "Auto-update podcast feed for ${TODAY}" || exit 0
          git pull --rebase origin main --autostash
          git push